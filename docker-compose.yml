version: '3.8'

services:
  frontend:
    build: .
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    networks:
      - retailflow-network
    restart: unless-stopped

  backend:
    build: ./retail-backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DATABASE_NAME=retail_flow
      - SECRET_KEY=your-super-secure-random-secret-key-change-this-in-production
      - DEBUG=False
      - ALLOWED_ORIGINS=["http://localhost:3000"]
    depends_on:
      mongo:
        condition: service_started
    networks:
      - retailflow-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  mongo:
    image: mongo:6.0
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=retail_flow
    networks:
      - retailflow-network
    restart: unless-stopped

volumes:
  mongo_data:

networks:
  retailflow-network:
    driver: bridge
